logging:
  ubiquia: INFO

ubiquia:
  mode: DEV
  cluster:
    flowService:
      sync:
        enabled: false
    name: ubiquia-cluster
    port: 7800
    seedHosts:
  agent:
    database:
      type: Postgres
      postgres:
        enabled: true
    flowService:
      bootstrap:
        enabled: true
        beliefState:
          deployments:
        graph:
          deployments:
    storage:
      minio:
        enabled: false

  components:
    core:
      beliefStateGeneratorService:
        image:
          registry: docker.io/ubiquia
          repository: core-belief-state-generator-service
          tag: latest
      communicationService:
        image:
          registry: docker.io/ubiquia
          repository: core-communication-service
          tag: latest
      flowService:
        image:
          registry: docker.io/ubiquia
          repository: core-flow-service
          tag: latest
    test:
      beliefStateGeneratorService:
        image:
          registry: docker.io/ubiquia
          repository: test-belief-state-generator-service
          tag: latest

infrastructure:
  image:
    pullPolicy: Never

telemetry:
  prometheus:
    enabled: false
    install: false
  grafana:
    install: false

postgresql:
  auth:
    database: ubiquia
    username: ubiquia
    password: ubiquia
