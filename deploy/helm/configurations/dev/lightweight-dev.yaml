logging:
  ubiquia: INFO

ubiquia:
  mode: DEV
  cluster:
    flowService:
      sync:
        enabled: false
    name: ubiquia-cluster
    port: 7800
    seedHosts:
  agent:
    flowService:
      bootstrap:
        enabled: true
        beliefState:
          deployments:
        graph:
          deployments:
            - name: state-dag
              domainOntologyName: abstract-world
              version:
                major: 1
                minor: 0
                patch: 0
              graphSettings:
                flag: demo
            - name: location-calculator-dag
              domainOntologyName: abstract-world
              version:
                major: 1
                minor: 0
                patch: 0
              graphSettings:
                flag: demo
            - name: entity-movement-dag
              domainOntologyName: abstract-world
              version:
                major: 1
                minor: 0
                patch: 0
              graphSettings:
                flag: demo
            - name: action-processing-dag
              domainOntologyName: abstract-world
              version:
                major: 1
                minor: 0
                patch: 0
              graphSettings:
                flag: demo
    storage:
      minio:
        enabled: false
        
  components:
    core:
      beliefStateGeneratorService:
        image:
          registry: docker.io/ubiquia
          repository: core-belief-state-generator-service
          tag: latest
      communicationService:
        image:
          registry: docker.io/ubiquia
          repository: core-communication-service
          tag: latest
      flowService:
        image:
          registry: docker.io/ubiquia
          repository: core-flow-service
          tag: latest
    test:
      beliefStateGeneratorService:
        image:
          registry: docker.io/ubiquia
          repository: test-belief-state-generator-service
          tag: latest

infrastructure:
  image:
    pullPolicy: Never