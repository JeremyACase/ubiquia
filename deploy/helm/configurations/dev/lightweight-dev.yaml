logging:
  ubiquia: INFO

ubiquia:
  cluster:
    flowService:
      sync:
        enabled: false
    name: ubiquia-cluster
    port: 7800
    seedHosts:
  agent:
    database: 
      h2:
        enabled: false
      yugabyte:
        enabled: true
    flowService:
      bootstrap:
        enabled: true
        beliefState:
          deployments:
        graph:
          deployments:
            - name: ubiquia-workbench
              version:
                major: 1
                minor: 0
                patch: 0
    storage:
      minio:
        enabled: false
        
  components:
    core:
      beliefStateGeneratorService:
        image:
          registry: docker.io/ubiquia
          repository: core-belief-state-generator-service
          tag: latest
      communicationService:
        image:
          registry: docker.io/ubiquia
          repository: core-communication-service
          tag: latest
      flowService:
        image:
          registry: docker.io/ubiquia
          repository: core-flow-service
          tag: latest
    test:
      beliefStateGeneratorService:
        image:
          registry: docker.io/ubiquia
          repository: test-belief-state-generator-service
          tag: latest

yugabyte:
  master:
    serverBroadcastAddress: "192.168.200.222"

  tserver:
    serverBroadcastAddress: "192.168.200.222"

infrastructure:
  image:
    pullPolicy: Never