logging:
  ubiquia: DEBUG

ubiquia:
  mode: TEST
  cluster:
    flowService:
      sync:
        enabled: false
    name: ubiquia-cluster
    port: 7800
    seedHosts:
  agent:
    database:
      type: YugabyteDB
      yugabyte:
        enabled: true
    flowService:
      bootstrap:
        enabled: false
      graph:
        deployments:
    storage:
      minio:
        enabled: false
  components:
    core:
      beliefStateGeneratorService:
        replicas: 0
        image:
          registry: docker.io/ubiquia
          repository: core-belief-state-generator-service
          tag: latest
      communicationService:
        replicas: 0
        image:
          registry: docker.io/ubiquia
          repository: core-communication-service
          tag: latest
      flowService:
        image:
          registry: docker.io/ubiquia
          repository: core-flow-service
          tag: latest
    test:
      beliefStateGeneratorService:
        image:
          registry: docker.io/ubiquia
          repository: test-belief-state-generator-service
          tag: latest
    util:
      simulationService:
        image:
          registry: docker.io/ubiquia
          repository: util-simulation-service
          tag: latest

telemetry:
  prometheus:
    enabled: false
    install: false
  grafana:
    install: false

yugabytedb:
  auth:
    database: yugabyte
    username: yugabyte
    password: yugabyte
  replicas:
    master: 1
    tserver: 1
  storage:
    master:
      storageClass: "standard"
      size: 1Gi
    tserver:
      storageClass: "standard"
      size: 1Gi
  gflags:
    master:
      replication_factor: "1"

testing:
  yugabyte:
    enabled: true
