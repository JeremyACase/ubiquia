{{- if and .Values.telemetry.prometheus.install .Values.telemetry.grafana.install }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ubiquia-grafana-datasource
  labels:
    grafana_datasource: "1"
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://{{ .Release.Name }}-prometheus-server.{{ .Release.Namespace }}.svc.cluster.local
        isDefault: true
        editable: false
{{- range $path, $_ := .Files.Glob "bootstrap/grafana/dashboards/*.json" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ubiquia-grafana-dashboard-{{ $path | base | trimSuffix ".json" }}
  labels:
    grafana_dashboard: "1"
data:
  {{ $path | base }}: |
{{ $.Files.Get $path | indent 4 }}
{{- end }}
{{- end }}
